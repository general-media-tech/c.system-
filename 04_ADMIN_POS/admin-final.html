function _cv3_renderPag() {
  const total = Math.max(1, Math.ceil(_cv3_filtered.length/_cv3_psize));
  const ctrl  = _cv3_$('cv3-pag-btns');
  if (!ctrl) return;
  let h = `<button class="pb" onclick="_cv3_goPage(${_cv3_page-1})" ${_cv3_page<=1?'disabled':''}>›</button>`;
  for (let p=1;p<=total;p++) {
    if(p===1||p===total||(p>=_cv3_page-1&&p<=_cv3_page+1)) h+=`<button class="pb ${p===_cv3_page?'act':''}" onclick="_cv3_goPage(${p})">${p}</button>`;
    else if(h.slice(-5)!=='…</sp') h+=`<span style="padding:0 3px;color:#9ca3af;font-size:11px;">…</span>`;
  }
  h+=`<button class="pb" onclick="_cv3_goPage(${_cv3_page+1})" ${_cv3_page>=total?'disabled':''}>‹</button>`;
  ctrl.innerHTML = h;
}

function _cv3_goPage(p) {
  const t=Math.ceil(_cv3_filtered.length/_cv3_psize);
  if(p<1||p>t)return; _cv3_page=p; _cv3_renderTable();
}

function _cv3_selInv(id) {
  _cv3_sel = _cv3_all.find(i=>i.id===id)||null;
  _cv3_renderTable(); _cv3_renderDetail();
  setTimeout(()=>{ const d=_cv3_$('cv3-det'); if(d)d.scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}

function _cv3_renderDetail() {
  if (!_cv3_sel) return;
  const inv = _cv3_sel;
  const b   = (typeof branches !== 'undefined') ? branches.find(x=>x.key_name===inv.branch_key) : null;
  const d   = new Date(inv.created_at||inv.date||Date.now());
  const ds  = inv.date || d.toLocaleDateString('ar-SY',{day:'2-digit',month:'2-digit',year:'numeric'});
  const ts  = inv.time || d.toLocaleTimeString('ar-SY',{hour:'2-digit',minute:'2-digit'});

  const set = (id,v) => { const el=_cv3_$(id); if(el) el.textContent=v; };
  set('cv3-inv-num', '#'+(inv.inv_number||inv.number||'000000'));
  set('cv3-d-date',     ds);
  set('cv3-d-time',     ts);
  set('cv3-d-pos',      b?.display_name||inv.branch_key||'--');
  set('cv3-d-user',     inv.user||inv.user_name||'--');
  set('cv3-d-customer', inv.customer_name||inv.customer||'--');
  set('cv3-d-phone',    inv.customer_phone||inv.phone||'--');
  set('cv3-d-type',     inv.sale_type||inv.saleType||'--');
  set('cv3-d-branch',   b?.display_name||inv.branch_key||'--');
  set('cv3-d-currency', 'دولار أمريكي');
  const noteEl = _cv3_$('cv3-notes-ta');
  if (noteEl) noteEl.value = inv.note||'';
  _cv3_renderProds(); _cv3_refreshSummary();
}

function _cv3_renderProds() {
  if (!_cv3_sel) return;
  const items = _cv3_sel.items||[];
  const tbody = _cv3_$('cv3-prod-tbody');
  if (!tbody) return;
  tbody.innerHTML = items.map((it,i) => {
    const pr=_cv3_itemProfit(it), rc=_cv3_prodRowCls(it), cv=_cv3_f2(it.commission||0);
    const cpct=it.actualPrice?((+(it.commission||0)/+it.actualPrice)*100).toFixed(0)+'%':'0%';
    return `<tr class="${rc}">
      <td>${i+1}</td>
      <td class="pt-name" title="${_cv3_esc(it.name||it.product_name||'--')}">${_cv3_esc(it.name||it.product_name||'--')}</td>
      <td>${it.qty||0}</td>
      <td>${_cv3_f2(it.salePrice||it.sale_price)}</td>
      <td>${_cv3_f2(it.wholesalePrice||it.wholesale_price)}</td>
      <td>${_cv3_f2(it.purchasePrice||it.purchase_price)}</td>
      <td>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;">
          <input class="comm-inp" type="number" value="${cv}" min="0" step="0.01"
            data-i="${i}" oninput="_cv3_onProdComm(${i},this.value)" onfocus="this.select()">
          <span class="comm-pct" id="cv3-cpct-${i}">(${cpct})</span>
        </div>
      </td>
      <td class="${pr>=0?'profit-g':'profit-r'}" id="cv3-pp-${i}" style="color:${pr>=0?'#16a34a':'#dc2626'};font-weight:800;">${_cv3_fmtUSD(pr)}</td>
    </tr>`;
  }).join('');
}

function _cv3_onProdComm(i, val) {
  if (!_cv3_sel) return;
  const it = _cv3_sel.items[i]; if (!it) return;
  it.commission = parseFloat(val)||0;
  const pr=_cv3_itemProfit(it);
  const pp=_cv3_$('cv3-pp-'+i); if(pp){pp.textContent=_cv3_fmtUSD(pr);pp.style.color=pr>=0?'#16a34a':'#dc2626';}
  const cp=_cv3_$('cv3-cpct-'+i); if(cp)cp.textContent=it.actualPrice?'('+(it.commission/+it.actualPrice*100).toFixed(0)+'%)':'(0%)';
  _cv3_refreshSummary(); _cv3_refreshStats();
}

function _cv3_onTotalCommInput(val) {
  if (!_cv3_sel) return;
  const total=parseFloat(val)||0, items=_cv3_sel.items||[];
  const tqty=items.reduce((s,it)=>s+(+it.qty||1),0)||1;
  items.forEach((it,i)=>{
    it.commission=total*((+it.qty||1)/tqty)/(+it.qty||1);
    const inp=document.querySelector(`.comm-inp[data-i="${i}"]`); if(inp)inp.value=_cv3_f2(it.commission);
    const pr=_cv3_itemProfit(it);
    const pp=_cv3_$('cv3-pp-'+i); if(pp){pp.textContent=_cv3_fmtUSD(pr);pp.style.color=pr>=0?'#16a34a':'#dc2626';}
    const cp=_cv3_$('cv3-cpct-'+i); if(cp)cp.textContent=it.actualPrice?'('+(it.commission/+it.actualPrice*100).toFixed(0)+'%)':'(0%)';
  });
  _cv3_refreshSummary(true); _cv3_refreshStats();
}

function _cv3_refreshSummary(skipTc) {
  if (!_cv3_sel) return;
  const items=_cv3_sel.items||[];
  const qty=items.reduce((s,it)=>s+(+it.qty||0),0);
  const total=_cv3_invActual(_cv3_sel), comm=_cv3_invComm(_cv3_sel), profit=_cv3_invProfit(_cv3_sel);
  const set=(id,v)=>{const el=_cv3_$(id);if(el)el.textContent=v;};
  set('cv3-sum-qty',   qty);
  set('cv3-sum-total', _cv3_fmtUSD(total));
  set('cv3-sum-ct',    _cv3_fmtUSD(comm));
  set('cv3-sum-cpct',  _cv3_pct(comm,total));
  const tc=_cv3_$('cv3-tc-input'); if(tc&&!skipTc&&document.activeElement!==tc)tc.value=_cv3_f2(comm);
  set('cv3-bc-comm',   _cv3_fmtUSD(comm));
  set('cv3-bc-cpct',   _cv3_pct(comm,total));
  const bcp=_cv3_$('cv3-bc-profit'); if(bcp){bcp.textContent=_cv3_fmtUSD(profit);bcp.style.color=profit>=0?'#16a34a':'#dc2626';}
  set('cv3-bc-ppct',   _cv3_pct(profit,total));
}

function _cv3_refreshStats() {
  const sales=_cv3_all.reduce((s,i)=>s+_cv3_invActual(i),0);
  const tcomm=_cv3_all.reduce((s,i)=>s+_cv3_invComm(i),0);
  const pcomm=_cv3_all.filter(i=>_cv3_invComm(i)>0).reduce((s,i)=>s+_cv3_invComm(i),0);
  const profit=_cv3_all.reduce((s,i)=>s+_cv3_invProfit(i),0);
  const set=(id,v)=>{const el=_cv3_$(id);if(el)el.textContent=v;};
  set('cv3-s-count',  _cv3_all.length);
  set('cv3-s-sales',  _cv3_fmtUSD(sales));
  set('cv3-s-tcomm',  _cv3_fmtUSD(tcomm));
  set('cv3-s-pcomm',  _cv3_fmtUSD(pcomm));
  set('cv3-s-profit', _cv3_fmtUSD(profit));
}

function _cv3_applyFilters() {
  const q=(_cv3_$('cv3-f-search')?.value||'').toLowerCase();
  const stat=_cv3_$('cv3-f-status')?.value||'';
  const type=_cv3_$('cv3-f-type')?.value||'';
  const pos=_cv3_$('cv3-f-pos')?.value||'';
  const user=_cv3_$('cv3-f-user')?.value||'';
  const df=_cv3_$('cv3-f-dfrom')?.value||'';
  const dt=_cv3_$('cv3-f-dto')?.value||'';
  _cv3_filtered = _cv3_all.filter(inv=>{
    if(q&&!String(inv.inv_number||inv.number||'').includes(q)&&!(inv.customer_name||inv.customer||'').toLowerCase().includes(q))return false;
    if(stat&&(inv.status||'pending')!==stat)return false;
    if(type&&(inv.sale_type||inv.saleType||'')!==type)return false;
    if(pos &&inv.branch_key!==pos)return false;
    if(user&&(inv.user||inv.user_name||'')!==user)return false;
    if(df&&(inv.date||'') < df)return false;
    if(dt&&(inv.date||'') > dt)return false;
    return true;
  });
  _cv3_page=1; _cv3_renderTable();
}

function _cv3_resetFilters() {
  ['cv3-f-search','cv3-f-status','cv3-f-type','cv3-f-pos','cv3-f-user','cv3-f-dfrom','cv3-f-dto'].forEach(id=>{
    const el=_cv3_$(id); if(el)el.value='';
  });
  _cv3_applyFilters();
}

async function _cv3_saveComm() {
  if (!_cv3_sel) return;
  const noteEl = _cv3_$('cv3-notes-ta');
  _cv3_sel.note   = noteEl ? noteEl.value.trim() : '';
  const comm      = _cv3_invComm(_cv3_sel);
  const btn       = document.querySelector('.save-btn');
  if (btn) { btn.disabled=true; btn.textContent='جارٍ الحفظ...'; }
  try {
    // Save per-product commissions to invoice_items
    for (const it of (_cv3_sel.items||[])) {
      if (!it.id) continue;
      await sb('PATCH', `/rest/v1/invoice_items?id=eq.${it.id}`,
        { commission: it.commission }, { Prefer:'return=minimal' });
    }
    // Save/update invoice_commissions record
    const payload = { invoice_id:_cv3_sel.id, branch_key:_cv3_sel.branch_key,
      amount:parseFloat(comm.toFixed(2)), note:_cv3_sel.note||null, created_by:'admin' };
    if (_cv3_sel._comm_id) {
      await sb('PATCH', `/rest/v1/invoice_commissions?id=eq.${_cv3_sel._comm_id}`,
        { amount:payload.amount, note:payload.note }, { Prefer:'return=minimal' });
    } else {
      const res = await sb('POST', '/rest/v1/invoice_commissions', {...payload, paid:false, approved:false});
      const rec = Array.isArray(res)?res[0]:res;
      if (rec?.id) _cv3_sel._comm_id = rec.id;
    }
    _cv3_sel.status = 'approved';
    showToast('✅ تم حفظ العمولة — ' + comm.toFixed(2) + '$', 'ok');
    _cv3_renderTable();
  } catch(e) { showToast('خطأ في الحفظ: '+e.message,'err'); }
  if (btn) { btn.disabled=false; btn.textContent=''; btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> حفظ العمولة'; }
}

async function _cv3_mobToggle(id) {
  const el  = document.getElementById(id);
  const arr = document.getElementById(id + 'arr');
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (arr) arr.style.transform = open ? '' : 'rotate(180deg)';
}

async function _cv3_approve(invId) {
  // كان هذا المسار يكتب على جدول commissions الخاطئ (بدل invoice_commissions) —
  // موافقة وهمية ما بتوصل الكاشير أبداً. الآن يوجّه للمسار الصحيح approveCommission
  // الذي يفتح نافذة تعديل المبلغ قبل الموافقة (نفس السلوك المطلوب: توافق على العمولة
  // التلقائية أو تعدّل رقمها ثم توافق).
  const comm = allComm.find(c => c.invoice_id === invId);
  if (comm) {
    const inv = allInvoices.find(i => i.id === invId) || _cv3_all.find(i => i.id === invId);
    approveCommission(comm.id, comm.branch_key || inv?.branch_key, Number(comm.amount) || 0);
  } else {
    showToast('لا توجد عمولة مسجّلة لهذه الفاتورة — راجعها من تبويب الفواتير', 'err');
  }
}

async function renderCommissions() {
  const c = document.getElementById('app-content');
  c.innerHTML = `<div class="empty-state"><div style="font-size:32px;">⏳</div><p style="margin-top:8px;font-weight:700;">جارٍ تحميل البيانات...</p></div>`;

  // ─── Load invoices ───
  let rawInvs = [];
  try {
    rawInvs = await sb('GET',
      '/rest/v1/invoices?order=created_at.desc&limit=500&select=id,inv_number,branch_key,customer_name,customer_phone,total,created_at,sale_type'
    );
    if (!Array.isArray(rawInvs)) rawInvs = [];
  } catch(e) { showToast('خطأ تحميل الفواتير: '+e.message,'err'); rawInvs=[]; }

  // ─── Load items ───
  let rawItems = [];
  try {
    rawItems = await sb('GET',
      '/rest/v1/invoice_items?select=id,invoice_id,product_name,qty,purchase_price,wholesale_price,sale_price,actual_price,commission&limit=5000&order=invoice_id.asc'
    );
    if (!Array.isArray(rawItems)) rawItems = [];
  } catch(e) {
    try {
      rawItems = await sb('GET','/rest/v1/invoice_items?select=id,invoice_id,product_name,qty,unit_price,commission&limit=5000');
      if(!Array.isArray(rawItems)) rawItems=[];
      rawItems = rawItems.map(it=>({...it, purchase_price:it.unit_price||0, wholesale_price:0, sale_price:it.unit_price||0, actual_price:it.unit_price||0}));
    } catch(_) { rawItems=[]; }
  }

  // ─── Load commission records ───
  let rawComms = [];
  try {
    rawComms = await sb('GET','/rest/v1/invoice_commissions?select=id,invoice_id,approved,paid,amount,note&limit=2000');
    if (!Array.isArray(rawComms)) rawComms = [];
  } catch(_) { rawComms = []; }

  // ─── Build map ───
  const itemMap = new Map();
  for (const it of rawItems) {
    if (!itemMap.has(it.invoice_id)) itemMap.set(it.invoice_id, []);
    itemMap.get(it.invoice_id).push({
      id: it.id, invoice_id: it.invoice_id,
      name: it.product_name||'--',
      qty:            +it.qty||1,
      purchasePrice:  +it.purchase_price||0,
      wholesalePrice: +it.wholesale_price||0,
      salePrice:      +it.sale_price||0,
      actualPrice:    +it.actual_price||0,
      commission:     +it.commission||0,
    });
  }
  const commMap = new Map((rawComms).map(c=>[c.invoice_id, c]));

  _cv3_all = rawInvs.map(inv => {
    const cr  = commMap.get(inv.id);
    const d   = new Date(inv.created_at);
    return {
      ...inv,
      items:    itemMap.get(inv.id) || [],
      status:   cr?.approved ? 'approved' : 'pending',

// TRANSFERS TAB
// ══════════════════════════════════════════
function renderTransfers() {
  // م6: لافتة الشاشة الموحّدة (الصندوق + العمولات + التسويات بمكان واحد)
  setTimeout(() => {
    /* إصلاح 2026-07-12 (فحص عميق): كان يبحث عن #tab-transfers أو .tab-content.active —
       وكلاهما غير موجود بهذه الصفحة إطلاقاً (كل التبويبات تُرسم داخل #app-content)،
       فكان host = null دائماً و return فوري → اللافتة لم تُعرض ولا مرة منذ بنائها. */
    const host = document.getElementById('app-content');
    if (!host || host.querySelector('#settl-banner')) return;
    const d = document.createElement('div');
    d.id = 'settl-banner';
    d.style.cssText = 'background:linear-gradient(135deg,#C00012,#8a000d);color:#fff;border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:0 6px 20px rgba(192,0,18,.28);';
    d.innerHTML = '<div style="font-size:24px;">🧾</div>'
      + '<div style="flex:1;"><div style="font-weight:900;font-size:14px;">الحساب الجاري والتسويات</div>'
      + '<div style="font-size:11px;opacity:.9;font-weight:700;line-height:1.7;">صندوق الفرع · عمولاته المستحقة · السحوبات · التسوية الشهرية — بشاشة واحدة، وكل عملية تُختم فلا تتكرر</div></div>'
      + '<div style="font-size:20px;">←</div>';
    d.onclick = () => window.GMTSettlements && GMTSettlements.open();
    host.insertBefore(d, host.firstChild);
  }, 60);
  // إخفاء المخازن (ألمانيا/الصين)
  const visibleBranches = branches.filter(b => !isExcludedBranch(b.key_name));
  const list = filteredTransfers();

  // بناء بيانات كل فرع مرئي
  const branchData = visibleBranches.map(b => {
    const bInvs   = allInvoices.filter(i => i.branch_key === b.key_name && !isExcludedBranch(i.branch_key));
    const bTrans  = allTransfers.filter(t => t.branch_key === b.key_name);
    const sales   = bInvs.reduce((s,i) => s + (Number(i.total)||0), 0);
    const commArr = allComm.filter(c => bInvs.some(i=>i.id===c.invoice_id));
    const commTotal = commArr.reduce((s,c) => s + (Number(c.amount)||0), 0);
    const transferred = bTrans.reduce((s,t) => s + (Number(t.amount)||0), 0);
    const netAfterComm  = sales - commTotal;
    const pendingNoComm = Math.max(0, sales      - transferred);
    const pendingComm   = Math.max(0, netAfterComm - transferred);
    return { b, sales, commTotal, transferred, netAfterComm, pendingNoComm, pendingComm, bTrans };
  });

  const totalPending = branchData.reduce((s,d) => s + d.pendingNoComm, 0);

  document.getElementById('app-content').innerHTML = `
    ${branchFilterHtml()}
    <div class="sec-head">
      <div>
        <div class="sec-title">💰 صناديق الفروع</div>
        <div class="sec-sub">إجمالي غير مُرحَّل: ${totalPending.toFixed(2)}$</div>
      </div>
      <button class="btn btn-red btn-sm" onclick="openNewTransferModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        تسجيل ترحيل
      </button>
    </div>

    <!-- صناديق الفروع -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px;">
      ${branchData.map(d => `
        <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;" onclick="toggleBranchDetail('bd-${d.b.key_name}')">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="width:36px;height:36px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;">${d.b.icon||'🏪'}</div>
              <div>
                <div style="font-size:14px;font-weight:900;color:var(--text);">${escH(d.b.display_name)}</div>
                <div style="font-size:11px;color:var(--text3);font-weight:700;">مبيعات: ${d.sales.toFixed(2)}$ · مُرحَّل: ${d.transferred.toFixed(2)}$</div>
              </div>
            </div>
            <div style="text-align:left;flex-shrink:0;">
              <div style="font-size:20px;font-weight:900;color:${d.pendingNoComm>0?'var(--warning)':'var(--success)'};">${d.pendingNoComm.toFixed(2)}$</div>
              <div style="font-size:10px;color:var(--text3);">قيد التحصيل</div>
            </div>
          </div>
          <!-- تفاصيل قابلة للطي -->
          <div id="bd-${d.b.key_name}" style="display:none;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">
              <div style="background:#f0fdf4;border-radius:10px;padding:10px;text-align:center;">
                <div style="font-size:10px;color:var(--text3);font-weight:700;">بدون عمولات</div>
                <div style="font-size:16px;font-weight:900;color:#16a34a;">${d.pendingNoComm.toFixed(2)}$</div>
              </div>

function setColType(type, full, comm) {
  const fullBtn = document.getElementById('col-type-full');

  if (fullBtn) { fullBtn.className = type==='full' ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm'; fullBtn.style.width='100%'; }
  if (commBtn) { commBtn.className = type==='comm' ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm'; commBtn.style.width='100%'; }
  if (amtEl)   amtEl.value = type==='full' ? full.toFixed(2) : (full-comm).toFixed(2);
}

async function savePartialTransfer(branchKey, pendingFull) {
  const amount = parseFloat(document.getElementById('col-amount')?.value||0);
  const note   = document.getElementById('col-note')?.value.trim()||'';
  if (isNaN(amount)||amount<=0) { showToast('أدخل مبلغاً صحيحاً','err'); return; }
  const remaining = pendingFull - amount;
  if (remaining > 0.01 && !confirm(`سيبقى ${remaining.toFixed(2)}$ في صندوق الفرع — متابعة؟`)) return;

  const b = branches.find(x=>x.key_name===branchKey);
  try {
    const res = await sb('POST', '/rest/v1/branch_transfers', {
      branch_key   : branchKey,
      amount,
      note         : note || (remaining>0.01?`تحصيل جزئي — متبقي ${remaining.toFixed(2)}$`:'تحصيل كامل'),
      transfer_date: new Date().toISOString().slice(0,10),
      confirmed_by : 'admin',
    });
    const newT = Array.isArray(res)?res[0]:res;
    if (newT) allTransfers.push(newT);
    await sendTelegram(
`<b>💰 تحصيل — GMT Admin</b>
━━━━━━━━━━━━━━━
<b>الفرع:</b> ${b?.display_name||branchKey}
<b>المحصَّل:</b> ${amount.toFixed(2)} $
${remaining>0.01?`<b>المتبقي في الصندوق:</b> ${remaining.toFixed(2)} $`:'✅ تحصيل كامل'}
${note?`<b>ملاحظة:</b> ${note}`:''}
<b>التوقيت:</b> ${new Date().toLocaleString('ar-SY')}`
    );
    showToast(`✅ تم تسجيل تحصيل ${amount.toFixed(2)}$ من ${b?.display_name||branchKey}`, 'ok');
    closeModal();
    renderTransfers();
  } catch(e) { showToast('خطأ: '+e.message,'err'); }
}

async function saveTransfer() {
  const branchKey = document.getElementById('tr-branch').value;
  const amount    = parseFloat(document.getElementById('tr-amount').value);
  const note      = document.getElementById('tr-note').value.trim();

  if (!branchKey) { showToast('اختر الفرع', 'err'); return; }
  if (isNaN(amount) || amount <= 0) { showToast('أدخل مبلغ صحيح', 'err'); return; }

  const b = branches.find(x=>x.key_name===branchKey);

  // Confirm with pending balance check
  const bInvs  = allInvoices.filter(i=>i.branch_key===branchKey);
  const bTrans = allTransfers.filter(t=>t.branch_key===branchKey);
  const bSales = bInvs.reduce((s,i)=>s+(Number(i.total)||0),0);
  const bTr    = bTrans.reduce((s,t)=>s+(Number(t.amount)||0),0);
  const pending = Math.max(0, bSales - bTr);

  if (amount > pending + 0.01) {
    if (!confirm(`المبلغ المدخل (${amount}$) أكبر من الرصيد غير المرحّل (${pending.toFixed(2)}$).\nهل تريد المتابعة؟`)) return;
  }

  try {
    const res = await sb('POST', '/rest/v1/branch_transfers', {
      branch_key  : branchKey,
      amount,
      note        : note || null,
      transfer_date: new Date().toISOString().slice(0,10),
      confirmed_by: 'admin',
    });
    const newT = Array.isArray(res) ? res[0] : res;
    if (newT) allTransfers.push(newT);
    // إشعار تلغرام
    await sendTelegram(
`<b>ترحيل مبيعات — GMT Admin</b>
━━━━━━━━━━━━━━━
<b>الفرع:</b> ${b?.display_name||branchKey}
<b>المبلغ:</b> ${amount.toFixed(2)} $
${note ? `<b>ملاحظة:</b> ${note}` : ''}
<b>التوقيت:</b> ${new Date().toLocaleString('ar-SY')}
━━━━━━━━━━━━━━━`
    );
    showToast(`تم تسجيل ترحيل ${amount}$ من ${b?.display_name||branchKey}`, 'ok');
    closeModal();
    renderTransfers();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

let _tgToken = '';
let _tgChat  = '';

async function loadTgConfig() {
  try {
    const rows = await sb('GET', `/rest/v1/gmt_settings?key=in.(telegram_bot_token,telegram_chat_id)&select=key,value`);
    (Array.isArray(rows)?rows:[]).forEach(r => {
      if (r.key === 'telegram_bot_token') _tgToken = r.value;
      if (r.key === 'telegram_chat_id')   _tgChat  = r.value;
    });
  } catch(_) {}
}

async function sendTelegram(text) {
  const token = _tgToken || TG_BOT;
  const chat  = _tgChat  || TG_CID;
  if (!token || !chat) return;
  try {
    await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chat, text, parse_mode: 'HTML' })
    });
  } catch(_) {}
}

async function saveManualDebt() {
  const direction = document.getElementById('mdebt-direction')?.value || 'owed_to_me';
  const name       = document.getElementById('mdebt-name')?.value.trim();
  const amount     = parseFloat(document.getElementById('mdebt-amount')?.value);
  const note       = document.getElementById('mdebt-note')?.value.trim();
  const linkedInv  = document.getElementById('mdebt-linked-inv')?.value.trim();
  if (!name) { showToast('أدخل اسم الشخص/الجهة', 'err'); return; }
  if (isNaN(amount) || amount <= 0) { showToast('أدخل مبلغاً صحيحاً', 'err'); return; }

  try {
    const res = await sb('POST', '/rest/v1/gmt_manual_debts', {
      direction, person_name: name, amount, note: note || null,
      linked_invoice_number: linkedInv || null,
      settled: false, created_at: new Date().toISOString(),
    });
    const rec = Array.isArray(res) ? res[0] : res;
    if (rec) allManualDebts.unshift(rec);
    showToast('✅ تم تسجيل الدين', 'ok');
    closeModal();
    renderDebts();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function settleManualDebt(id) {
  if (!confirm('تأكيد تسوية هذا الدين؟')) return;
  try {
    await sb('PATCH', `/rest/v1/gmt_manual_debts?id=eq.${id}`,
      { settled: true, settled_at: new Date().toISOString() }, { Prefer:'return=minimal' });
    const d = allManualDebts.find(x => x.id === id);
    if (d) d.settled = true;
    showToast('✅ تم تسجيل التسوية', 'ok');
    renderDebts();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function deleteManualDebt(id) {
  if (!confirm('حذف هذا السجل نهائياً؟')) return;
  try {
    await sb('DELETE', `/rest/v1/gmt_manual_debts?id=eq.${id}`, null, { Prefer:'return=minimal' });

    showToast('🗑 تم الحذف', 'ok');
    renderDebts();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

/* ═══ م6-ب (قرار المالك 2026-07-11): عمولة البيع الآجل «معلّقة» حتى يُحصَّل ثمن
   الفاتورة فعلياً. عند اكتمال التحصيل تُحرَّر فتصبح قابلة للموافقة والتسوية. ═══ */
async function releaseCommOnCollect(invId) {
  try {
    const c = allComm.find(x => x.invoice_id === invId && x.awaiting_collection);
    if (!c) return;
    await sb('PATCH', `/rest/v1/invoice_commissions?invoice_id=eq.${invId}`,
      { awaiting_collection: false }, { Prefer: 'return=minimal' });
    allComm.forEach(x => { if (x.invoice_id === invId) x.awaiting_collection = false; });
    showToast('💜 تحرّرت عمولة الفاتورة الآجلة — صارت مستحقة', 'ok');
  } catch (e) { console.warn('[comm] تعذّر تحرير عمولة الآجل:', e.message); }
}

// خيار 1: تحصيل كامل المبلغ + تسجيل العمولة كدين عليّ (الإدارة)
async function collectDebtInvoice(invId, mode, remaining, commAmount) {
  const label = mode === 'full_with_comm' ? 'تحصيل كامل + العمولة كدين علي' : 'تحصيل مع اقتطاع العمولة';
  if (!confirm(`${label}\nالمبلغ: ${remaining.toFixed(2)}$${commAmount>0?` (عمولة: ${commAmount.toFixed(2)}$)`:''}`)) return;
  try {
    await releaseCommOnCollect(invId);   // م6-ب: تحرير عمولة الآجل عند التحصيل الكامل
    await sb('PATCH', `/rest/v1/invoices?id=eq.${invId}`,
      { payment_status: 'paid', paid_amount: remaining, remaining_amount: 0 },
      { Prefer:'return=minimal' });

    if (mode === 'full_with_comm' && commAmount > 0) {
      // العمولة تُسجَّل كدين على الإدارة (يُسجَّل في الديون اليدوية كـ i_owe)
      const inv = allDebts.find(d => d.id === invId);
      await sb('POST', '/rest/v1/gmt_manual_debts', {
        direction: 'i_owe', person_name: (inv?.branch_name||'فرع') + ' — عمولة فاتورة #' + (inv?.inv_number||''),
        amount: commAmount, note: 'عمولة محصَّلة مع الفاتورة — مستحقة للفرع',
        settled: false, created_at: new Date().toISOString(),
      });
    } else if (mode === 'minus_comm' && commAmount > 0) {
      // اقتطاع العمولة فوراً — لا دين متبقٍ
      const c = allComm.find(x => x.invoice_id === invId);
      if (c) {
        // م6 (دمج): الاقتطاع أيضاً يُختم بسجل تسوية
        await GMTSettlements.stampPay([c.id], c.branch_key, Number(c.amount)||0, 'single', 'اقتُطعت العمولة عند تحصيل الدين');
      }
    }

    allDebts = allDebts.filter(d => d.id !== invId);
    await loadManualDebts();
    showToast('✅ تم التحصيل', 'ok');
    closeModal();
    renderDebts();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

// خيار 2: تحصيل مبلغ جزئي — الباقي يبقى ديناً
async function collectDebtPartial(invId, remaining) {
  const amountStr = prompt(`أدخل المبلغ المُحصَّل من أصل ${remaining.toFixed(2)}$:`);
  if (amountStr === null) return;
  const amount = parseFloat(amountStr);
  if (isNaN(amount) || amount <= 0 || amount > remaining) { showToast('مبلغ غير صحيح', 'err'); return; }

  try {
    const newRemaining = remaining - amount;
    const newStatus = newRemaining <= 0.01 ? 'paid' : 'partial';
    await sb('PATCH', `/rest/v1/invoices?id=eq.${invId}`,
      { payment_status: newStatus, paid_amount: amount, remaining_amount: Math.max(0,newRemaining) },
      { Prefer:'return=minimal' });

    if (newStatus === 'paid') {
      await releaseCommOnCollect(invId);   // م6-ب: اكتمل السداد → تُستحق العمولة
      allDebts = allDebts.filter(d => d.id !== invId);
    } else {
      const d = allDebts.find(x => x.id === invId);
      if (d) { d.remaining_amount = newRemaining; d.payment_status = 'partial'; }
    }
    showToast(`✅ تم تحصيل ${amount.toFixed(2)}$ — الباقي ${Math.max(0,newRemaining).toFixed(2)}$ في صندوق الفرع`, 'ok');
    closeModal();
    renderDebts();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

// تحصيل كل ديون فرع دفعة واحدة
async function collectAllBranchDebts(branchKey, total) {
  if (!confirm(`تحصيل كامل ديون هذا الفرع (${total.toFixed(2)}$)؟`)) return;
  const items = allDebts.filter(d => (d.branch_key||'unknown') === branchKey);
  try {
    await Promise.all(items.map(d =>
      sb('PATCH', `/rest/v1/invoices?id=eq.${d.id}`,
        { payment_status: 'paid', paid_amount: Number(d.remaining_amount ?? d.total)||0, remaining_amount: 0 },
        { Prefer:'return=minimal' })
    ));
    allDebts = allDebts.filter(d => (d.branch_key||'unknown') !== branchKey);
    showToast('✅ تم تحصيل كامل ديون الفرع', 'ok');
    closeModal();
    renderDebts();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

        style="width:100%;border:2px solid var(--border);border-radius:10px;padding:11px 14px;

        style="width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 14px;
               font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;outline:none;box-sizing:border-box;">
    </div>

    <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;">
      <input type="checkbox" id="exp-auto-approve" ${isGeneral ? 'checked' : ''} style="width:18px;height:18px;">
      <span style="font-size:12px;font-weight:700;color:var(--text2);">
        ${isGeneral ? 'اعتماد فوري (مصروف إدارة) — ينقص من الصندوق مباشرة' : 'اعتماد فوري بدلاً من الانتظار'}
      </span>
    </label>

    <button onclick="saveExpense(${isGeneral})"
      style="width:100%;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:12px;
             padding:13px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;">
      💾 حفظ المصروف
    </button>`;
  document.getElementById('modal').style.display = 'flex';
}

function toggleExpenseExchangeRate() {
  const cur = document.getElementById('exp-currency')?.value;
  const wrap = document.getElementById('exp-exchange-wrap');
  if (wrap) wrap.style.display = cur === 'syp' ? '' : 'none';
}

async function saveExpense(isGeneral) {
  const branchKey = isGeneral ? null : document.getElementById('exp-branch')?.value;
  const title      = document.getElementById('exp-title')?.value.trim();
  const amount     = parseFloat(document.getElementById('exp-amount')?.value);
  const currency   = document.getElementById('exp-currency')?.value || 'usd';
  const exchangeRate = currency === 'syp' ? parseFloat(document.getElementById('exp-exchange-rate')?.value) : null;
  const note       = document.getElementById('exp-note')?.value.trim();
  const autoApprove = document.getElementById('exp-auto-approve')?.checked || false;

  if (!title) { showToast('أدخل عنوان المصروف', 'err'); return; }
  if (isNaN(amount) || amount <= 0) { showToast('أدخل مبلغاً صحيحاً', 'err'); return; }
  if (currency === 'syp' && (isNaN(exchangeRate) || exchangeRate <= 0)) { showToast('أدخل سعر الصرف', 'err'); return; }

  try {
    const res = await sb('POST', '/rest/v1/gmt_expenses', {
      branch_key: branchKey, title, amount, currency,
      exchange_rate: exchangeRate, note: note || null,
      approved: autoApprove, approved_at: autoApprove ? new Date().toISOString() : null,
      is_general: isGeneral, created_at: new Date().toISOString(),
    });
    const rec = Array.isArray(res) ? res[0] : res;
    if (rec) allExpenses.unshift(rec);

    // إذا فرع ومُعتمد فوراً — ينقص من صندوق الفرع
    if (!isGeneral && branchKey && autoApprove) {
      await deductExpenseFromBranchCashbox(branchKey, amount, currency, exchangeRate, title);
    }

    showToast('✅ تم حفظ المصروف', 'ok');
    closeModal();
    renderExpenses();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function approveExpense(id) {
  const e = allExpenses.find(x => x.id === id);
  if (!e) return;
  if (!confirm(`الموافقة على مصروف "${e.title}" بقيمة ${Number(e.amount).toFixed(2)} ${e.currency==='usd'?'$':'ل.س'}؟`)) return;
  try {
    await sb('PATCH', `/rest/v1/gmt_expenses?id=eq.${id}`,
      { approved: true, approved_at: new Date().toISOString() }, { Prefer:'return=minimal' });
    e.approved = true; e.approved_at = new Date().toISOString();

    if (e.branch_key) {
      await deductExpenseFromBranchCashbox(e.branch_key, Number(e.amount), e.currency, e.exchange_rate, e.title);
    }
    showToast('✅ تمت الموافقة', 'ok');
    renderExpenses();
  } catch(err) { showToast('خطأ: ' + err.message, 'err'); }
}

async function editExpenseAmount(id) {
  const e = allExpenses.find(x => x.id === id);
  if (!e) return;
  const newAmountStr = prompt('تعديل المبلغ:', e.amount);
  if (newAmountStr === null) return;
  const newAmount = parseFloat(newAmountStr);
  if (isNaN(newAmount) || newAmount <= 0) { showToast('مبلغ غير صحيح', 'err'); return; }
  try {
    await sb('PATCH', `/rest/v1/gmt_expenses?id=eq.${id}`, { amount: newAmount }, { Prefer:'return=minimal' });
    e.amount = newAmount;
    showToast('✅ تم التعديل', 'ok');
    renderExpenses();
  } catch(err) { showToast('خطأ: ' + err.message, 'err'); }
}

async function deleteExpense(id) {
  if (!confirm('حذف هذا المصروف نهائياً؟')) return;
  try {
    await sb('DELETE', `/rest/v1/gmt_expenses?id=eq.${id}`, null, { Prefer:'return=minimal' });
    allExpenses = allExpenses.filter(x => x.id !== id);
    showToast('🗑 تم الحذف', 'ok');
    renderExpenses();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

// خصم المصروف من صندوق الفرع — يستخدم نفس جدول branch_transfers المستخدم في الترحيلات والتحصيل
async function deductExpenseFromBranchCashbox(branchKey, amount, currency, exchangeRate, title) {
  try {
    const usdAmount = currency === 'usd' ? amount : amount / (Number(exchangeRate)||14000);
    const b = branches.find(x => x.key_name === branchKey);
    await sb('POST', '/rest/v1/branch_transfers', {
      branch_key  : branchKey,
      branch_name : b?.display_name || branchKey,
      amount      : -Math.abs(usdAmount),   // سالب = خصم من الصندوق
      type        : 'expense',              // نوع جديد "مصروف"
      note        : `مصروف: ${title}`,
      created_by  : 'الإدارة (موافقة مصروف)',
      created_at  : new Date().toISOString(),
    });
  } catch(e) {
    console.warn('[Expenses] فشل تسجيل حركة الصندوق:', e.message);
  }
}

async function loadCustomers() {
  try {
    const rows = await sb('GET', '/rest/v1/gmt_customers?order=created_at.desc&limit=1000&select=*');
    allCustomers = Array.isArray(rows) ? rows : [];
  } catch(e) {
    // الجدول ربما غير موجود بعد - نبني البيانات من الفواتير
    const seen = new Map();
    allInvoices.forEach(inv => {
      if (inv.customer_name && inv.customer_phone) {
        const key = inv.customer_phone.trim();
        if (!seen.has(key)) {
          seen.set(key, {
            id: key,
            name: inv.customer_name,
            phone: inv.customer_phone,
            branch_key: inv.branch_key,
            branch_name: inv.branch_name,
            is_blocked: false,
            created_at: inv.created_at,
          });
        }
      }
    });
    allCustomers = [...seen.values()];
  }
}

function renderCustomers() {
  const c = document.getElementById('app-content');
  const searchId = 'cust-search-' + Date.now();
  c.innerHTML = `
    ${branchFilterHtml()}
    <div class="filter-row">
      <input class="filter-input" type="search" id="${searchId}"
        placeholder="ابحث باسم العميل أو رقم الجوال..."
        oninput="renderCustomerList('${searchId}')">
    </div>
    <div class="sec-head">
      <div class="sec-title" id="cust-count-lbl">جارٍ التحميل...</div>
      <button class="btn btn-ghost btn-sm" onclick="loadCustomers().then(()=>renderCustomers())">🔄 تحديث</button>
    </div>
    <div id="cust-list"></div>
  `;
  renderCustomerList(searchId);
}

function renderCustomerList(searchId) {
  const q = (document.getElementById(searchId)?.value || '').toLowerCase();
  let list = allCustomers;
  if (activeBranch !== 'all') list = list.filter(c => c.branch_key === activeBranch);
  if (q) list = list.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.phone||'').includes(q)
  );
  const label = document.getElementById('cust-count-lbl');
  if (label) label.textContent = `${list.length} عميل`;
  const container = document.getElementById('cust-list');
  if (!container) return;

  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="ico">👥</div><p>لا يوجد عملاء مسجّلون</p><p style="font-size:11px;margin-top:6px;">العملاء يُسجَّلون تلقائياً عند إنشاء الفواتير</p></div>';
    return;
  }

  // نحسب عدد فواتير كل عميل
  const invCount = (phone) => allInvoices.filter(i => i.customer_phone === phone).length;
  const totalSpent = (phone) => allInvoices.filter(i => i.customer_phone === phone).reduce((s,i)=>s+(Number(i.total)||0),0);

  container.innerHTML = list.map(cust => {
    const cnt   = invCount(cust.phone);
    const spent = totalSpent(cust.phone);
    const branchInfo = cust.branch_name || branches.find(b=>b.key_name===cust.branch_key)?.display_name || cust.branch_key || '—';
    const isBlocked = cust.is_blocked;
    return `
    <div style="background:${isBlocked?'#fef2f2':'var(--surface)'};border:1.5px solid ${isBlocked?'var(--danger)':'var(--border)'};border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
        <div>
          <div style="font-size:14px;font-weight:900;${isBlocked?'color:var(--danger);':''}">
            ${isBlocked?'🚫 ':''} ${escH(cust.name||'—')}
          </div>
          <div style="font-size:12px;font-weight:700;color:var(--text3);direction:ltr;">${escH(cust.phone||'—')}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px;">📍 ${escH(branchInfo)}</div>
        </div>
        <div style="text-align:left;">
          <div style="font-size:13px;font-weight:900;color:var(--success);">${spent.toFixed(2)} $</div>
          <div style="font-size:10px;color:var(--text3);">${cnt} فاتورة</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${isBlocked
          ? `<button class="btn btn-success btn-sm" onclick="toggleBlockCustomer('${cust.id}',false,'${escH(cust.name)}')">✅ رفع الحظر</button>`
          : `<button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger);border:1.5px solid var(--danger);" onclick="toggleBlockCustomer('${cust.id}',true,'${escH(cust.name)}')">🚫 حظر العميل</button>`}
        <button class="btn btn-ghost btn-sm" onclick="viewCustomerInvoices('${escH(cust.phone)}','${escH(cust.name)}')">📋 فواتيره</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleBlockCustomer(custId, block, name) {
  const msg = block ? `حظر العميل "${name}"؟` : `رفع الحظر عن "${name}"؟`;
  if (!confirm(msg)) return;
  try {
    await sb('PATCH', `/rest/v1/gmt_customers?id=eq.${custId}`,
      { is_blocked: block }, { Prefer: 'return=minimal' });
    const c = allCustomers.find(x => x.id === custId);
    if (c) c.is_blocked = block;
    showToast(block ? '🚫 تم حظر العميل' : '✅ تم رفع الحظر', block ? 'err' : 'ok');
    renderCustomers();
  } catch(e) {
    showToast('خطأ: ' + e.message + ' (تأكد من وجود جدول gmt_customers)', 'err');
  }
}

function viewCustomerInvoices(phone, name) {
  const invs = allInvoices.filter(i => i.customer_phone === phone);
  document.getElementById('modal-title').textContent = `فواتير: ${name}`;
  if (!invs.length) {
    document.getElementById('modal-body').innerHTML = '<div class="empty-state"><div class="ico">📭</div><p>لا توجد فواتير</p></div>';
  } else {
    const total = invs.reduce((s,i)=>s+(Number(i.total)||0),0);
    document.getElementById('modal-body').innerHTML = `
      <div style="background:var(--red-light);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;">
        <span style="font-size:13px;font-weight:700;">${invs.length} فاتورة</span>
        <span style="font-size:16px;font-weight:900;color:var(--red);">${total.toFixed(2)} $</span>
      </div>
      ${invs.map(inv => {
        const d = new Date(inv.created_at);
        const ds = d.toLocaleDateString('ar-SY',{day:'2-digit',month:'2-digit',year:'numeric'});
        return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:13px;font-weight:800;color:var(--red);">#${inv.inv_number}</div>
            <div style="font-size:11px;color:var(--text3);">${ds} · ${escH(inv.branch_name||inv.branch_key)}</div>
          </div>
          <div style="font-size:14px;font-weight:900;">${Number(inv.total).toFixed(2)}$</div>
        </div>`;
      }).join('')}
    `;
  }
  document.getElementById('modal').style.display = 'flex';
}

function aiOnBranchChange() {
  const branch = document.getElementById('ai-branch').value;
  const area = document.getElementById('ai-product-area');

  else { area.style.opacity = '0.5'; area.style.pointerEvents = 'none'; }

  aiRenderCart();
}

function aiSearchProducts(q) {
  const box = document.getElementById('ai-search-results');
  q = (q || '').trim().toLowerCase();
  if (!q) { box.style.display = 'none'; return; }
  const branchKey = document.getElementById('ai-branch').value;
  const matches = _aiProducts.filter(p =>
    (p.name || '').toLowerCase().includes(q) || (p.barcode || '').includes(q)
  ).slice(0, 20);
  if (!matches.length) { box.innerHTML = '<div style="padding:12px;color:var(--text3);font-size:12px;">لا نتائج</div>'; box.style.display = 'block'; return; }
  box.innerHTML = matches.map(p => {
    const stock = Number(p[branchKey]) || 0;
    return `<div onclick="aiAddToCart('${escH(String(p.id))}')" style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='#fff'">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escH(p.name || '')}</div>
        <div style="font-size:10px;color:var(--text3);">${p.barcode ? escH(p.barcode) + ' · ' : ''}متوفر: ${stock} · ${Number(p.price||0).toFixed(2)}$</div>
      </div>
      ${stock <= 0 ? '<span style="font-size:10px;color:var(--danger);font-weight:800;">نفد</span>' : ''}
    </div>`;
  }).join('');
  box.style.display = 'block';
}

function aiAddToCart(productId) {
  const branchKey = document.getElementById('ai-branch').value;
  const p = _aiProducts.find(x => String(x.id) === String(productId));
  if (!p) return;
  const stock = Number(p[branchKey]) || 0;
  const existing = _aiCart.find(x => String(x.id) === String(productId));
  if (existing) {
    if (existing.qty < stock) existing.qty++;
    else { showToast('الكمية تجاوزت المتوفر بالفرع', 'err'); }
  } else {
    _aiCart.push({ id: p.id, name: p.name, barcode: p.barcode || '', price: Number(p.price) || 0, qty: 1, stock });
  }
  document.getElementById('ai-search').value = '';
  document.getElementById('ai-search-results').style.display = 'none';
  aiRenderCart();
}

function aiRenderCart() {
  const box = document.getElementById('ai-cart-items');
  if (!_aiCart.length) {
    box.innerHTML = '<p style="text-align:center;color:var(--text3);font-size:13px;padding:20px 0;">لم تُضف منتجات بعد</p>';
    aiUpdateTotal();
    return;
  }
  box.innerHTML = _aiCart.map((it, i) => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escH(it.name)}</div>
        <div style="font-size:10px;color:var(--text3);">متوفر: ${it.stock}</div>
      </div>
      <input type="number" min="0" step="0.01" value="${it.price}" onchange="aiSetPrice(${i}, this.value)" title="السعر" style="width:80px;padding:7px;border:1.5px solid var(--border);border-radius:7px;text-align:center;font-size:12px;font-weight:700;font-family:'Cairo',sans-serif;">
      <input type="number" min="1" max="${it.stock}" value="${it.qty}" onchange="aiSetQty(${i}, this.value)" title="الكمية" style="width:60px;padding:7px;border:1.5px solid var(--border);border-radius:7px;text-align:center;font-size:12px;font-weight:800;font-family:'Cairo',sans-serif;">
      <span style="width:70px;text-align:left;font-size:13px;font-weight:800;color:var(--red);">${(it.price*it.qty).toFixed(2)}$</span>
      <button onclick="aiRemoveItem(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:4px;">✕</button>
    </div>`).join('');
  aiUpdateTotal();
}

function aiSetPrice(i, val) { if (_aiCart[i]) { _aiCart[i].price = Math.max(0, Number(val) || 0); aiRenderCart(); } }
function aiSetQty(i, val) {
  if (!_aiCart[i]) return;
  let q = parseInt(val) || 1;
  if (q > _aiCart[i].stock) { q = _aiCart[i].stock; showToast('الكمية القصوى = المتوفر بالفرع', 'err'); }
  if (q < 1) q = 1;
  _aiCart[i].qty = q;
  aiRenderCart();
}
function aiRemoveItem(i) { _aiCart.splice(i, 1); aiRenderCart(); }

function aiUpdateTotal() {
  const subtotal = _aiCart.reduce((s, it) => s + it.price * it.qty, 0);
  const discount = Number(document.getElementById('ai-discount')?.value) || 0;
  const total = Math.max(0, subtotal - discount);
  const el = document.getElementById('ai-grand-total');
  if (el) el.textContent = total.toFixed(2) + ' $';
}

async function aiCreateInvoice() {
  const branchKey = document.getElementById('ai-branch').value;
  const branchObj = branches.find(b => b.key_name === branchKey);
  const branchName = branchObj?.display_name || branchKey;
  const customer = document.getElementById('ai-customer').value.trim();
  const discount = Number(document.getElementById('ai-discount').value) || 0;
  const withCommission = document.getElementById('ai-commission').checked;

  if (!branchKey) { showToast('اختر الفرع أولاً', 'err'); return; }
  if (!_aiCart.length) { showToast('أضف منتجاً واحداً على الأقل', 'err'); return; }

  const subtotal = _aiCart.reduce((s, it) => s + it.price * it.qty, 0);
  const total = Math.max(0, subtotal - discount);
  const itemsCount = _aiCart.reduce((s, it) => s + it.qty, 0);

  if (!confirm(`إنشاء فاتورة من الإدارة على فرع "${branchName}":\n\n• المنتجات: ${_aiCart.length} (${itemsCount} قطعة)\n• الإجمالي: ${total.toFixed(2)}$\n• العمولة: ${withCommission ? 'نعم' : 'لا'}\n\nسيُخصم من مخزون الفرع فوراً، وتظهر للفرع كفاتورة تحتاج تنفيذ.`)) return;

  const btn = document.getElementById('ai-create-btn');
  btn.disabled = true; btn.textContent = 'جارٍ الإنشاء...';

  try {
    // 1. توليد رقم فاتورة (بادئة الفرع + رقم)
    const prefix = (branchKey || 'INV').slice(0, 3).toUpperCase();
    let invNumber = `${prefix}-${Date.now().toString().slice(-6)}`;

    // 2. إنشاء الفاتورة (تظهر كفاتورة رئيسية عادية + علامة أنشأها الأدمن + حالة تحتاج تنفيذ)
    const now = new Date().toISOString();
    const invPayload = {
      inv_number: invNumber,
      branch_key: branchKey,
      branch_name: branchName,
      total: total,
      items_count: itemsCount,
      customer_name: customer || null,
      sale_type: 'نقدي',
      payment_status: 'مدفوعة',
      cashier_name: branchName,   // تظهr كأن الفرع أنشأها
      created_by_admin: true,
      admin_exec_status: 'pending',
      notes: 'تم الإنشاء بواسطة الإدارة (أدمن)',
      created_at: now,
    };
    const invRes = await sb('POST', '/rest/v1/invoices', invPayload);
    const invId = Array.isArray(invRes) && invRes[0] ? invRes[0].id : null;

    // 3. حفظ البنود
    if (invId) {
      const itemsPayload = _aiCart.map(it => ({
        invoice_id: invId,
        product_id: String(it.id),
        product_name: it.name,
        barcode: it.barcode || null,
        qty: it.qty,
        unit_price: it.price,
        total: it.price * it.qty,
      }));
      await sb('POST', '/rest/v1/invoice_items', itemsPayload).catch(() => {});
    }

    // 4. خصم المخزون من الفرع (RPC ذرّي، مثل نقطة البيع)
    let stockErrors = 0;
    for (const it of _aiCart) {
      try {
        await sb('POST', '/rest/v1/rpc/decrement_branch_stock', { p_product_id: String(it.id), p_branch_key: branchKey, p_qty: it.qty });
      } catch(e) { stockErrors++; }
    }

    // 5. العمولة (إن فُعّلت) — تُسجّل بجدول العمولات كبقية الفواتير
    if (withCommission && invId) {
      try {
        await sb('POST', '/rest/v1/invoice_commissions', {
          invoice_id: invId, branch_key: branchKey, amount: 0, approved: false, paid: false, created_at: now,
        });
      } catch(e) {}
    }

    // 6. إشعار تيليجرام
    sendTelegram(
`<b>🧾 فاتورة من الإدارة</b>
━━━━━━━━━━━━━━━
<b>الفرع:</b> ${branchName}
<b>رقم الفاتورة:</b> ${invNumber}
<b>الإجمالي:</b> ${total.toFixed(2)} $
<b>العمولة:</b> ${withCommission ? 'نعم' : 'لا'}
<b>الحالة:</b> بانتظار تنفيذ الفرع
${stockErrors ? `⚠️ تعذّر خصم ${stockErrors} منتج من المخزون` : ''}`
    );

    showToast(stockErrors ? `⚠️ أُنشئت الفاتورة لكن تعذّر خصم ${stockErrors} منتج` : '✅ تم إنشاء الفاتورة وخصمها من الفرع', stockErrors ? 'err' : 'ok');
    _aiCart = [];
    renderAdminInvoice();
  } catch(e) {
    showToast('خطأ: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '✅ إنشاء الفاتورة وخصمها من مخزون الفرع';
  }
}

function filterProdSelector(containerId, checkClass, q) {
  const labels = document.querySelectorAll(`#${containerId} label[data-name]`);
  q = q.toLowerCase();
  labels.forEach(lbl => {
    const name = (lbl.dataset.name||'').toLowerCase();
    lbl.style.display = (!q || name.includes(q)) ? '' : 'none';
    // إظهار المجموعة إذا فيها نتائج
    if (q) {
      const groupDiv = lbl.closest('[class^="group-prods-"]') || lbl.closest('[class*="group-prods-"]');
      if (groupDiv && !groupDiv.style.display && lbl.style.display !== 'none') groupDiv.style.display = 'block';
    }
  });
}

function toggleGroupProds(containerId, checkClass, group) {
  const safeG = group.replace(/\s/g,'_');
  const div = document.querySelector(`.group-prods-${safeG}`);
  if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
}

function selectGroupProds(checkClass, group, checked) {
  document.querySelectorAll(`.${checkClass}[data-group="${group}"]`).forEach(cb => { cb.checked = checked; });
}

function selectAllProds(checkClass, checked) {
  document.querySelectorAll(`.${checkClass}`).forEach(cb => { cb.checked = checked; });
}

  document.getElementById('of-type-bundle').style.width = '100%';
  const bundleSec = document.getElementById('of-products-section');

async function saveOffer() {
  const name  = document.getElementById('of-name')?.value.trim();
  const desc  = document.getElementById('of-desc')?.value.trim();
  const img   = document.getElementById('of-img')?.value.trim();
  const reel  = document.getElementById('of-reel')?.value.trim();
  const price = parseFloat(document.getElementById('of-price')?.value || 0);
  const endsAtRaw = document.getElementById('of-ends-at')?.value || '';
  const endsAt = endsAtRaw ? new Date(endsAtRaw).toISOString() : null;

  if (!name) { showToast('أدخل اسم العرض', 'err'); return; }
  if (!price || price <= 0) { showToast('أدخل سعر العرض', 'err'); return; }

  let products = [];
  let productId = null;
  let originalPrice = null;
  if (_offerType === 'bundle') {
    document.querySelectorAll('.of-prod-check:checked').forEach(cb => {
      products.push({ id: cb.value, name: cb.dataset.name, price: parseFloat(cb.dataset.price)||0 });
    });
    if (!products.length) { showToast('اختر منتجاً واحداً على الأقل للباقة', 'err'); return; }
  } else {
    // العرض المفرد لازم يرتبط بمنتج جرد محدد
    if (!_ofSingleProdId) { showToast('اختر المنتج المرتبط بالعرض المفرد', 'err'); return; }
    productId = _ofSingleProdId;
    originalPrice = _ofSingleProdPrice || null;
  }

  try {
    await sb('POST', '/rest/v1/gmt_offers', {
      name, description: desc || null, image_url: img || null, reel_url: reel || null,
      offer_price: price, offer_type: _offerType,
      products: products.length ? JSON.stringify(products) : null,
      product_id: productId,
      original_price: originalPrice,
      ends_at: endsAt,
      is_active: true,
    });
    showToast('✅ تم حفظ العرض بنجاح', 'ok');
    closeModal();
    renderOffers();
    // إشعار تيليجرام
    sendTelegram(
`<b>🎁 عرض جديد — GMT Admin</b>
━━━━━━━━━━━━━━━
<b>الاسم:</b> ${name}
<b>السعر:</b> ${price.toFixed(2)} $
<b>النوع:</b> ${_offerType === 'bundle' ? 'باقة' : 'فردي'}${_offerType==='single' && _ofSingleProdName ? ` (${_ofSingleProdName})` : ''}
${endsAt ? `<b>ينتهي:</b> ${new Date(endsAt).toLocaleString('ar-SY')}` : ''}
${desc ? `<b>الوصف:</b> ${desc}` : ''}
<b>التوقيت:</b> ${new Date().toLocaleString('ar-SY')}`
    );
  } catch(e) { showToast('خطأ: ' + e.message + ' — تأكد من وجود جدول gmt_offers في Supabase', 'err'); }
}

async function deleteOffer(id) {
  if (!confirm('حذف هذا العرض؟')) return;
  try {
    await sb('DELETE', `/rest/v1/gmt_offers?id=eq.${id}`, null, { Prefer: 'return=minimal' });
    showToast('✅ تم حذف العرض', 'ok');
    renderOffers();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function copyOfferText(id) {
  try {
    const rows = await sb('GET', `/rest/v1/gmt_offers?id=eq.${id}&select=*`);
    const offer = rows?.[0];
    if (!offer) return;
    const prods = offer.products ? JSON.parse(offer.products) : [];
    const text = `🎁 ${offer.name}\n\n${offer.description || ''}\n\n💰 سعر العرض: ${Number(offer.offer_price).toFixed(2)} $${prods.length ? '\n\n📦 يشمل: ' + prods.map(p=>p.name).join(' + ') : ''}\n\n📞 للاستفسار والطلب: +963 939773715`;
    navigator.clipboard.writeText(text).then(() => showToast('✅ تم نسخ النص للنشر', 'ok'));
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

let _cpType = 'percent';
function setCpType(type) {
  _cpType = type;
  document.getElementById('cp-type-pct').className = type==='percent' ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('cp-type-fix').className = type==='fixed'   ? 'btn btn-red btn-sm' : 'btn btn-ghost btn-sm';
  document.getElementById('cp-type-pct').style.width = '100%';
  document.getElementById('cp-type-fix').style.width = '100%';
  const h = document.getElementById('cp-val-hint');
  if (h) h.textContent = type === 'percent' ? 'مثال: 20 = خصم 20% (الحد الأقصى 100)' : 'مثال: 5 = خصم $5';
  const maxEl = document.getElementById('cp-max')?.parentElement;
  if (maxEl) maxEl.style.display = type === 'percent' ? 'block' : 'none';
}

function generateCouponCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  const el = document.getElementById('cp-code');
  if (el) el.value = code;
}

async function saveCoupon() {
  const code   = document.getElementById('cp-code')?.value.trim().toUpperCase();
  const cust   = document.getElementById('cp-cust')?.value.trim();
  const val    = parseFloat(document.getElementById('cp-val')?.value || 0);
  const minP   = parseFloat(document.getElementById('cp-min')?.value || 0);
  const maxD   = parseFloat(document.getElementById('cp-max')?.value || 0);
  const exp    = document.getElementById('cp-exp')?.value;

  if (!code) { showToast('أدخل كود الكوبون', 'err'); return; }
  if (!val || val <= 0) { showToast('أدخل قيمة الخصم', 'err'); return; }
  if (_cpType === 'percent' && val > 100) { showToast('نسبة الخصم لا يمكن أن تتجاوز 100%', 'err'); return; }

  const prods = [];
  document.querySelectorAll('.cp-prod-check:checked').forEach(cb => {
    prods.push({ id: cb.value, name: cb.dataset.name });
  });

  try {
    await sb('POST', '/rest/v1/gmt_coupons', {
      code,
      customer_name      : cust || null,
      discount_type      : _cpType,
      discount_value     : val,
      min_purchase       : minP > 0 ? minP : null,
      max_discount       : maxD > 0 ? maxD : null,
      expires_at         : exp ? new Date(exp + 'T23:59:59').toISOString() : null,
      applicable_products: prods.length ? JSON.stringify(prods) : null,
      is_used            : false,
    });
    showToast('✅ تم إنشاء الكوبون: ' + code, 'ok');
    closeModal();
    renderCoupons();
  } catch(e) {
    if (e.message?.includes('duplicate') || e.message?.includes('unique')) {
      showToast('⚠️ هذا الكود موجود مسبقاً — اختر كوداً آخر', 'err');
    } else {
      showToast('خطأ: ' + e.message + ' — تأكد من وجود جدول gmt_coupons في Supabase', 'err');
    }
  }
}

function copyCouponCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('✅ تم نسخ الكود: ' + code, 'ok'));
}

async function markCouponUsed(id) {
  if (!confirm('تعليم هذا الكوبون كمستخدَم؟')) return;
  try {
    await sb('PATCH', `/rest/v1/gmt_coupons?id=eq.${id}`, { is_used: true, used_at: new Date().toISOString() }, { Prefer: 'return=minimal' });
    showToast('✅ تم تعليم الكوبون كمستخدَم', 'ok');
    renderCoupons();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}

async function deleteCoupon(id) {
  if (!confirm('حذف هذا الكوبون؟')) return;
  try {
    await sb('DELETE', `/rest/v1/gmt_coupons?id=eq.${id}`, null, { Prefer: 'return=minimal' });
    showToast('✅ تم حذف الكوبون', 'ok');

  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }

// UTILS
// ══════════════════════════════════════════
/* ══════════════════════════════════════════════════════════════════════
   إصلاح 2026-07-12 (فحص عميق) — ثلاث دوال كانت **مستدعاة ولم تُعرَّف قط**:
     • escHtml()    — استُدعيت 12 مرة داخل قالب طباعة فاتورة النقل
     • showLoading() — أول سطر في printTransfer()
     • hideLoading() — مرتان بنفس الدالة
   الأثر الفعلي: `showLoading(...)` هو **أول سطر تنفيذي** في دالة طباعة فاتورة
   النقل ⇒ ReferenceError فوري ⇒ **الدالة تموت قبل أن تفعل شيئاً، ولا تُطبع
   فاتورة نقل أبداً.** زر يُضغط ولا يحدث شيء — خطأ صامت نموذجي.
   السبب على الأرجح: نُسخت الدالة من ملف آخر كان يملك هذه المساعدات.
   الحل: escHtml اسم بديل لـ escH الموجودة، و showLoading/hideLoading تُبنيان
   على showToast + مؤشّر تحميل بسيط.
   ══════════════════════════════════════════════════════════════════════ */
function escHtml(s){ return escH(s); }

let _gmtLoadEl = null;
function showLoading(msg){
  hideLoading();
  _gmtLoadEl = document.createElement('div');
  _gmtLoadEl.className = 'gmt-modal-bg';
  _gmtLoadEl.style.zIndex = '9800';
  _gmtLoadEl.innerHTML =
    '<div class="gmt-card" style="text-align:center;min-width:210px;">'
    + '<div style="font-size:26px;margin-bottom:8px;">⏳</div>'
    + '<div class="gmt-strong" style="font-size:13px;">' + escH(msg || 'جارٍ التنفيذ…') + '</div></div>';
  document.body.appendChild(_gmtLoadEl);
}
function hideLoading(){
  if (_gmtLoadEl) { _gmtLoadEl.remove(); _gmtLoadEl = null; }
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg,type=''){
  const t=document.createElement('div');t.className='toast '+(type==='ok'?'ok':type==='err'?'err':'');t.textContent=msg;
  document.getElementById('toast-wrap').appendChild(t);
  setTimeout(()=>{t.style.transition='opacity 0.3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);
}

  { icon:'⚙️', title:'الفروع المخفية', text:'ألمانيا والصين مخازن فقط — لا تظهر في الترحيلات ولا الفواتير. جميع فروعهم تحول لصندوق حلب.' },
];

function showOnboarding() {
  if (localStorage.getItem(ONBOARD_KEY)) return;
  let step = 0;
  const overlay = document.createElement('div');
  overlay.id = 'onboard-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;padding:20px;';

  function render() {
    const s = ONBOARD_STEPS[step];
    overlay.innerHTML = `
      <div style="background:white;border-radius:24px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,0.5);">
        <div style="text-align:center;margin-bottom:18px;">
          <div style="font-size:52px;margin-bottom:10px;">${s.icon}</div>
          <div style="font-size:18px;font-weight:900;color:#111;margin-bottom:8px;">${s.title}</div>
          <div style="font-size:13px;color:#6b7280;font-weight:600;line-height:1.7;">${s.text}</div>
        </div>
        <!-- نقاط التقدم -->
        <div style="display:flex;justify-content:center;gap:6px;margin-bottom:18px;">
          ${ONBOARD_STEPS.map((_,i) => `<div style="width:${i===step?18:7}px;height:7px;border-radius:4px;background:${i===step?'#d5001c':'#e5e7eb'};transition:all 0.3s;"></div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;">
          ${step > 0 ? `<button onclick="onboardPrev()" style="flex:1;background:#f3f4f6;color:#374151;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;">← السابق</button>` : ''}
          ${step < ONBOARD_STEPS.length-1
            ? `<button onclick="onboardNext()" style="flex:2;background:linear-gradient(135deg,#d42b2b,#ef4444);color:white;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;">التالي ←</button>`
            : `<button onclick="onboardDone()" style="flex:2;background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border:none;border-radius:12px;padding:12px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;">✅ ابدأ الاستخدام</button>`}
        </div>
        <div style="text-align:center;margin-top:10px;">
          <button onclick="onboardDone()" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;font-family:'Cairo',sans-serif;">تخطي الشرح</button>
        </div>
      </div>`;
  }

  window.onboardNext = () => { if (step < ONBOARD_STEPS.length-1) { step++; render(); } };
  window.onboardPrev = () => { if (step > 0) { step--; render(); } };
  window.onboardDone = () => {
    localStorage.setItem(ONBOARD_KEY, '1');
    overlay.remove();
    setTimeout(() => window._gmtTour?.start(), 300);
  };

  render();
  document.body.appendChild(overlay);
}

// إظهار شاشة الترحيب بعد تسجيل الدخول (أول مرة فقط) — أو الجولة التفاعلية مباشرة إن كانت الشاشة التعريفية قد عُرضت سابقاً
function triggerOnboarding() {
  if (localStorage.getItem(ONBOARD_KEY)) {
    if (localStorage.getItem('tour_done_' + PAGE_ID) !== 'true') {
      setTimeout(() => window._gmtTour?.start(), 600);
    }
  } else {
    setTimeout(showOnboarding, 800);
  }
}

// ══════════════════════════════════════════════════════════════
// نظام المحاسبة الشامل — صندوق حلب المركزي + كل التدفقات المالية
// ══════════════════════════════════════════════════════════════
const ACC_HALEB_KEYS = ['haleb', 'aleppo', 'hlb', 'halb', 'حلب'];
function isHalebBranch(key) {
  return ACC_HALEB_KEYS.some(k => (key||'').toLowerCase().includes(k));
}

// ── فلترة بحسب الشهر المُختار (افتراضياً الشهر الحالي) ──
let accSelectedMonth = new Date().toISOString().slice(0,7); // 'YYYY-MM'

function accInMonth(dateStr, ym) {
  if (!dateStr) return false;
  return String(dateStr).slice(0,7) === ym;
}

function renderAccounting() {
  const ym = accSelectedMonth;
  const c = document.getElementById('app-content');
  c.innerHTML = `<div class="empty-state"><div style="font-size:32px;">⏳</div><p style="margin-top:8px;font-weight:700;">جارٍ تجميع البيانات المحاسبية...</p></div>`;

  // ════════ 1) المبيعات الكلية لكل الفروع (غير حلب) — هذه "تُرحَّل" إلى حلب ════════
  const nonHalebInvoices = allInvoices.filter(i => !isHalebBranch(i.branch_key) && !isExcludedBranch(i.branch_key));
  const halebInvoices    = allInvoices.filter(i => isHalebBranch(i.branch_key));

  const totalSalesAllBranches = allInvoices
    .filter(i => !isExcludedBranch(i.branch_key))
    .reduce((s,i) => s + (Number(i.total)||0), 0);

  const totalSalesThisMonth = allInvoices
    .filter(i => !isExcludedBranch(i.branch_key) && accInMonth(i.created_at, ym))
    .reduce((s,i) => s + (Number(i.total)||0), 0);

  // ════════ 2) العمولات (تُخصَم من صافي حلب — هي مستحقة للفروع) ════════
  const totalCommThisMonth = allComm
    .filter(c2 => { const inv = allInvoices.find(i=>i.id===c2.invoice_id); return inv && accInMonth(inv.created_at, ym); })
    .reduce((s,c2) => s + (Number(c2.amount)||0), 0);

  // ════════ 3) الترحيلات الفعلية المستلمة في حلب (من صناديق الفروع) ════════
  const totalTransferredThisMonth = allTransfers
    .filter(t => accInMonth(t.created_at, ym) && (t.type !== 'expense'))
    .reduce((s,t) => s + (Number(t.amount)||0), 0);

  // المعلّق (غير مرحَّل بعد) من كل الفروع
  const totalPendingNotTransferred = (() => {
    const visibleBranches = branches.filter(b => !isExcludedBranch(b.key_name) && !isHalebBranch(b.key_name));
    return visibleBranches.reduce((sum, b) => {
      const bInvs = allInvoices.filter(i => i.branch_key === b.key_name);
      const sales = bInvs.reduce((s,i)=>s+(Number(i.total)||0),0);
      const bTrans = allTransfers.filter(t => t.branch_key === b.key_name && t.type !== 'expense');
      const transferred = bTrans.reduce((s,t)=>s+(Number(t.amount)||0),0);
      return sum + Math.max(0, sales - transferred);
    }, 0);
  })();

  // ════════ 4) المصاريف (فروع + عامة) — كلها تُخصَم من حلب ════════
  const approvedExpenses = allExpenses.filter(e => e.approved);
  const expensesThisMonthUSD = approvedExpenses
    .filter(e => accInMonth(e.created_at, ym))
    .reduce((s,e) => s + (e.currency === 'usd' ? Number(e.amount)||0 : (Number(e.amount)||0)/(Number(e.exchange_rate)||14000)), 0);
  const pendingExpenses = allExpenses.filter(e => !e.approved);

  // ════════ 5) فواتير الشراء — قيمة المنتجات + التكاليف المؤجَّلة (جمارك/شحن) ════════
  const purchasesThisMonth = allPurchases.filter(p => accInMonth(p.created_at || p.inv_date, ym));
  const totalPurchasesValue = purchasesThisMonth.reduce((s,p) => s + (Number(p.total_amount)||0), 0);
  // التكاليف المؤجَّلة غير المدفوعة (جمارك + شحن + نقل + محلي)
  const unpaidCostsShipments = allPurchases.filter(p => {
    const hasCosts = (Number(p.cost_customs)||0) + (Number(p.cost_shipping)||0) + (Number(p.cost_transport)||0) + (Number(p.cost_local)||0) > 0;
    return hasCosts && !p.costs_paid;
  });
  const totalUnpaidCosts = unpaidCostsShipments.reduce((s,p) =>
    s + (Number(p.cost_customs)||0) + (Number(p.cost_shipping)||0) + (Number(p.cost_transport)||0) + (Number(p.cost_local)||0), 0);

  // البضائع قيد الاستيراد (لم تصل بعد)
  const inTransitShipments = allPurchases.filter(p => p.status && p.status !== 'arrived');
  const inTransitValue = inTransitShipments.reduce((s,p) => s + (Number(p.total_amount)||0), 0);

  // ════════ 6) المعلّق عند شركات الشحن (من الأوردرات) ════════
  const shippingPending = {};
  allOrdersAcc.forEach(o => {
    if ((o.status === 'shipped' || o.status === 'delivered') && o.shipping_company) {
      shippingPending[o.shipping_company] = (shippingPending[o.shipping_company]||0) + (Number(o.price)||0);
    }
  });
  const totalShippingPending = Object.values(shippingPending).reduce((s,v)=>s+v,0);

  // ════════ 7) عرابين الحجوزات + المتبقي ════════
  const activeReservations = allReservationsAcc.filter(r => r.status !== 'completed' && r.status !== 'cancelled');
  const totalDeposits  = activeReservations.reduce((s,r) => s + (Number(r.deposit)||0), 0);
  const totalRemaining = activeReservations.reduce((s,r) => {
    const full = Number(r.total_price || r.price || r.full_price) || 0;
    const dep  = Number(r.deposit) || 0;
    return s + Math.max(0, full - dep);
  }, 0);

  // ════════ 8) الديون اليدوية ════════
  const manualOwedToMe = allManualDebts.filter(d => d.direction === 'owed_to_me' && !d.settled).reduce((s,d)=>s+(Number(d.amount)||0),0);
  const manualIOwe     = allManualDebts.filter(d => d.direction === 'i_owe'      && !d.settled).reduce((s,d)=>s+(Number(d.amount)||0),0);

  // ════════ 9) ديون فواتير غير محصَّلة (آجل) ════════
  const totalUnpaidInvoices = allDebts.reduce((s,d)=>s+(Number(d.remaining_amount ?? d.total)||0),0);

  // ════════ 10) صندوق حلب المركزي — كل شيء يرحل إليها ════════
  // = مبيعات حلب المباشرة + الترحيلات المستلمة من الفروع - العمولات المستحقة - المصاريف المعتمدة - تكاليف الاستيراد المدفوعة
  const halebDirectSales = halebInvoices.reduce((s,i)=>s+(Number(i.total)||0),0);
  const halebCashbox = halebDirectSales + totalTransferredThisMonth - totalCommThisMonth - expensesThisMonthUSD;

  // ════════ 11) صافي الربح الشامل (تقديري) ════════
  // صافي = إجمالي المبيعات - العمولات - المصاريف - قيمة المشتريات (تكلفة البضاعة)
  const netProfitEstimate = totalSalesThisMonth - totalCommThisMonth - expensesThisMonthUSD - totalPurchasesValue;

  // ── قائمة الأشهر المتاحة للفلترة ──
  const allDates = [
    ...allInvoices.map(i=>i.created_at),
    ...allExpenses.map(e=>e.created_at),
    ...allPurchases.map(p=>p.created_at||p.inv_date),
  ].filter(Boolean);
  const monthsSet = new Set(allDates.map(d => String(d).slice(0,7)));
  monthsSet.add(ym);
  const monthsList = [...monthsSet].sort().reverse();

  c.innerHTML = `
    <div class="sec-head">
      <div class="sec-title">📊 النظام المحاسبي الشامل</div>
      <select id="acc-month-select" onchange="accSelectedMonth=this.value;renderAccounting();"
        style="border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;
               font-family:'Cairo',sans-serif;font-size:12px;font-weight:800;">
        ${monthsList.map(m => `<option value="${m}" ${m===ym?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>

    <!-- صندوق حلب المركزي -->
    <div style="background:linear-gradient(135deg,#7c2d12,#991b1b);border-radius:16px;padding:18px;margin-bottom:16px;color:#fff;">
      <div style="font-size:11px;font-weight:800;opacity:0.85;margin-bottom:4px;">🏛️ صندوق حلب المركزي (الصندوق الرئيسي)</div>
      <div style="font-size:30px;font-weight:900;">${halebCashbox.toFixed(2)}$</div>
      <div style="display:flex;gap:14px;margin-top:10px;font-size:10px;font-weight:700;opacity:0.9;flex-wrap:wrap;">
        <span>+ مبيعات حلب: ${halebDirectSales.toFixed(2)}$</span>
        <span>+ ترحيلات الفروع: ${totalTransferredThisMonth.toFixed(2)}$</span>
        <span>- عمولات: ${totalCommThisMonth.toFixed(2)}$</span>
        <span>- مصاريف: ${expensesThisMonthUSD.toFixed(2)}$</span>
      </div>
    </div>

    <!-- صافي الربح الشهري -->
    <div style="background:${netProfitEstimate>=0?'linear-gradient(135deg,#15803d,#166534)':'linear-gradient(135deg,#b91c1c,#7f1d1d)'};
                border-radius:16px;padding:18px;margin-bottom:16px;color:#fff;">
      <div style="font-size:11px;font-weight:800;opacity:0.85;margin-bottom:4px;">💎 صافي الربح التقديري — ${ym}</div>
      <div style="font-size:28px;font-weight:900;">${netProfitEstimate.toFixed(2)}$</div>
      <div style="font-size:10px;font-weight:700;opacity:0.9;margin-top:6px;">
        مبيعات (${totalSalesThisMonth.toFixed(2)}$) − عمولات (${totalCommThisMonth.toFixed(2)}$) − مصاريف (${expensesThisMonthUSD.toFixed(2)}$) − مشتريات (${totalPurchasesValue.toFixed(2)}$)
      </div>
    </div>

    <!-- شبكة الملخصات -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">

      <div class="acc-card" style="border-right:4px solid #d97706;">
        <div class="acc-card-lbl">⏳ غير مُرحَّل من الفروع</div>
        <div class="acc-card-val" style="color:#d97706;">${totalPendingNotTransferred.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #dc2626;">
        <div class="acc-card-lbl">📋 ديون فواتير غير محصَّلة</div>
        <div class="acc-card-val" style="color:#dc2626;">${totalUnpaidInvoices.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #C00012;">
        <div class="acc-card-lbl">🚚 معلّق عند شركات الشحن</div>
        <div class="acc-card-val" style="color:#C00012;">${totalShippingPending.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #0891b2;">
        <div class="acc-card-lbl">📦 عرابين حجوزات (مستلمة)</div>
        <div class="acc-card-val" style="color:#0891b2;">${totalDeposits.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #0891b2;">
        <div class="acc-card-lbl">📦 متبقي حجوزات (لم يُحصَّل)</div>
        <div class="acc-card-val" style="color:#0891b2;">${totalRemaining.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #ea580c;">
        <div class="acc-card-lbl">✈️ بضائع قيد الاستيراد</div>
        <div class="acc-card-val" style="color:#ea580c;">${inTransitValue.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #be123c;">
        <div class="acc-card-lbl">🛃 جمارك/شحن غير مدفوعة</div>
        <div class="acc-card-val" style="color:#be123c;">${totalUnpaidCosts.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #d97706;">
        <div class="acc-card-lbl">🧾 مصاريف بانتظار الموافقة</div>
        <div class="acc-card-val" style="color:#d97706;">${pendingExpenses.length}</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #dc2626;">
        <div class="acc-card-lbl">💰 مدين لي (دائن)</div>
        <div class="acc-card-val" style="color:#dc2626;">${manualOwedToMe.toFixed(2)}$</div>
      </div>

      <div class="acc-card" style="border-right:4px solid #2563eb;">
        <div class="acc-card-lbl">💸 أنا مدين</div>
        <div class="acc-card-val" style="color:#2563eb;">${manualIOwe.toFixed(2)}$</div>
      </div>

    </div>

    <!-- تفصيل المعلّق بشركات الشحن -->
    ${Object.keys(shippingPending).length ? `
    <div class="sec-head"><div class="sec-title">🚚 تفصيل المعلّق حسب شركة الشحن</div></div>
    <div style="margin-bottom:16px;">
      ${Object.entries(shippingPending).map(([co,amt]) => `
        <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface);
                    border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;">
          <span style="font-size:12px;font-weight:800;">${escH(co)}</span>
          <span style="font-size:14px;font-weight:900;color:#C00012;">${amt.toFixed(2)}$</span>
        </div>`).join('')}
    </div>` : ''}

    <!-- جمارك/شحن غير مدفوعة — تفصيل -->
    ${unpaidCostsShipments.length ? `
    <div class="sec-head"><div class="sec-title">🛃 دفعات جمارك/شحن مستحقة</div></div>
    <div style="margin-bottom:16px;">
      ${unpaidCostsShipments.map(p => purchaseCostsPendingRowHtml(p)).join('')}
    </div>` : ''}

    <!-- المصاريف بانتظار الموافقة -->
    ${pendingExpenses.length ? `
    <div class="sec-head"><div class="sec-title">⏳ مصاريف بانتظار موافقتك</div></div>
    <div style="margin-bottom:16px;">
      ${pendingExpenses.map(e => expenseCardHtml(e)).join('')}
    </div>` : ''}

    <div style="text-align:center;padding:14px;color:var(--text3);font-size:10px;font-weight:700;">
      📌 الأرقام أعلاه تقديرية بناءً على البيانات المسجَّلة في النظام — راجع التفاصيل دورياً
    </div>
  `;
}

function purchaseCostsPendingRowHtml(p) {
  const totalCosts = (Number(p.cost_customs)||0) + (Number(p.cost_shipping)||0) + (Number(p.cost_transport)||0) + (Number(p.cost_local)||0);
  const dateStr = new Date(p.created_at || p.inv_date).toLocaleDateString('ar-SY',{day:'2-digit',month:'2-digit',year:'numeric'});
  return `
  <div class="inv-card" style="border-right:4px solid #be123c;margin-bottom:8px;cursor:default;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
      <div style="min-width:0;flex:1;">

async function markPurchaseCostsPaid(purchaseId) {
  const p = allPurchases.find(x => x.id === purchaseId);
  if (!p) return;
  const totalCosts = (Number(p.cost_customs)||0) + (Number(p.cost_shipping)||0) + (Number(p.cost_transport)||0) + (Number(p.cost_local)||0);
  if (!confirm(`تأكيد دفع تكاليف الجمارك/الشحن (${totalCosts.toFixed(2)}$) لفاتورة #${p.inv_number||p.id}؟\nسيُسجَّل كمصروف معتمد فوراً.`)) return;

  try {
    await sb('PATCH', `/rest/v1/import_log?id=eq.${purchaseId}`, { costs_paid: true }, { Prefer:'return=minimal' });
    p.costs_paid = true;

    // تسجيله كمصروف عام معتمد تلقائياً (يدخل في حسابات المحاسبة)
    const res = await sb('POST', '/rest/v1/gmt_expenses', {
      branch_key: null,
      title: `جمارك/شحن — فاتورة شراء #${p.inv_number||p.id} (${p.supplier||''})`,
      amount: totalCosts, currency: 'usd', exchange_rate: null,
      note: 'دفعة مؤجَّلة لتكاليف استيراد', is_general: true,
      approved: true, approved_at: new Date().toISOString(),
      created_at: new Date().toISOString(),
    });
    const rec = Array.isArray(res) ? res[0] : res;
    if (rec) allExpenses.unshift(rec);

    showToast('✅ تم تسجيل الدفع — أُضيف كمصروف معتمد', 'ok');
    renderAccounting();
  } catch(e) { showToast('خطأ: ' + e.message, 'err'); }
}
