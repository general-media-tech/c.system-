let _adminNotifPollTimer = null;
let _adminUnreadNotifs = [];

async function loadAdminStNotifications() {
  try {
    const rows = await sb('GET',
      "/rest/v1/branch_notifications?type=eq.new_transfer&order=created_at.desc&limit=20"
    );
    if (!Array.isArray(rows)) return;
    _adminUnreadNotifs = rows.filter(n => !n.read_at);
    updateAdminStBadge();
  } catch(e) {}
}

async function markAdminNotifRead(notifId) {
  try {
    await sb('PATCH', `/rest/v1/branch_notifications?id=eq.${notifId}`,
      { read_at: new Date().toISOString() }, { Prefer: 'return=minimal' });
    _adminUnreadNotifs = _adminUnreadNotifs.filter(n => n.id !== notifId);
    updateAdminStBadge();
  } catch(e) {}
}

function startAdminNotifPolling() {
  if (_adminNotifPollTimer) clearInterval(_adminNotifPollTimer);
  loadAdminStNotifications();
  _adminNotifPollTimer = setInterval(loadAdminStNotifications, 60000); // كل دقيقة
}

// تُستدعى عند تحميل صفحة الأدمن
startAdminNotifPolling();


async function openStockTransferDetailAdmin(id) {
  const t = allStockTransfersAdmin.find(x => x.id === id);
  if (!t) return;
  document.getElementById('modal-title').textContent = t.transfer_number;
  document.getElementById('modal-body').innerHTML = `<div style="text-align:center;padding:20px;color:var(--text3);">جارٍ التحميل...</div>`;
  document.getElementById('modal').style.display = 'flex';

  let items = [];
  try { items = await sb('GET', `/rest/v1/stock_transfer_items?transfer_id=eq.${id}&select=*`); } catch (e) {}
  // إصلاح: احترام qty المُحدَّثة — إذا فشل خصم صنف (deduction_failed=true) qty=0 في السجل
  // لا نستخدم الكمية الأصلية المطلوبة وقت الإنشاء
  const totalQty  = items.reduce((s,i) => s + (Number(i.qty)||0), 0);
  const totalCost = items.reduce((s,i) => s + (i.unit_cost  || 0) * (Number(i.qty)||0), 0);
  const totalSale = items.reduce((s,i) => s + (i.sale_price || 0) * (Number(i.qty)||0), 0);
  const failedItems = items.filter(i => i.deduction_failed);

  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:13px;font-weight:700;margin-bottom:10px;">
      📤 ${escH(t.from_branch_name)} → 📥 ${escH(t.to_branch_name)}
    </div>
    <div style="max-height:240px;overflow-y:auto;margin-bottom:10px;">
      ${items.map(i => `
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;
                          ${i.deduction_failed ? 'opacity:0.5;text-decoration:line-through;' : ''}">
          <span>${escH(i.product_name)} × ${Number(i.qty)||0}${i.deduction_failed ? ' <span style="color:#dc2626;font-size:10px;font-weight:900;">(فشل الخصم)</span>' : ''}</span>
          <span style="color:var(--text3);">$${((i.sale_price||0)*(Number(i.qty)||0)).toFixed(2)}</span>
        </div>`).join('')}
    </div>
    <div style="background:var(--surface2);border-radius:10px;padding:10px;font-size:12px;margin-bottom:14px;">
      القطع: <b>${totalQty}</b> · تكلفة: <b>$${totalCost.toFixed(2)}</b> · مبيع: <b>$${totalSale.toFixed(2)}</b> ·
      ربح متوقع: <b style="color:var(--success);">$${(totalSale-totalCost).toFixed(2)}</b>
    </div>
    ${t.signature_url ? `<img src="${t.signature_url}" style="width:100%;border-radius:10px;margin-bottom:14px;">` : ''}
    <button onclick="printStockTransferInvoice('${t.id}')"
      style="width:100%;background:linear-gradient(135deg,#1f348f,#2c44b8);color:#fff;border:none;border-radius:10px;
             padding:11px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:8px;">
      🖨️ طباعة فاتورة النقل
    </button>
    ${failedItems.length ? `
      <div style="background:#fef3c7;border:1.5px solid #fbbf24;border-radius:10px;padding:10px;margin-bottom:10px;font-size:11px;font-weight:800;color:#92400e;">
        ⚠️ ${failedItems.length} صنف فشل خصمه (مخزون غير كافٍ) — كميته في الفاتورة أصبحت صفراً تلقائياً
      </div>` : ''}
    ${t.status === 'pending' ? `
      <button onclick="openTransferTool()"
        style="width:100%;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:10px;
               padding:11px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px;">
        ✅ تأكيد الاستلام (يفتح أداة النقل)
      </button>
      <button onclick="cancelStockTransferAdmin('${t.id}')"
        style="width:100%;background:var(--danger-bg);color:var(--danger);border:1.5px solid var(--danger);border-radius:10px;
               padding:11px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;">
        ❌ إلغاء فاتورة النقل وإعادة الكمية للفرع المُصدِّر
      </button>` : ''}
  `;
}
window.openStockTransferDetailAdmin = openStockTransferDetailAdmin;

async function cancelStockTransferAdmin(id) {
  if (!confirm('هل أنت متأكد من إلغاء فاتورة النقل؟ ستُعاد كل الكميات للفرع المُصدِّر فوراً.')) return;
  const t = allStockTransfersAdmin.find(x => x.id === id);
  if (!t) return;
  try {
    const items = await sb('GET', `/rest/v1/stock_transfer_items?transfer_id=eq.${id}&select=*`);
    for (const it of items) {
      await sb('POST', '/rest/v1/rpc/add_branch_stock', { p_product_id: it.product_id, p_branch_key: t.from_branch, p_qty: it.qty });
      try {
        const prod = await sb('GET', `/rest/v1/products?id=eq.${it.product_id}&select=in_transit`);
        const cur = (prod[0] && prod[0].in_transit) || {};
        const newQty = Math.max(0, (Number(cur[t.to_branch]) || 0) - it.qty);
        await sb('PATCH', `/rest/v1/products?id=eq.${it.product_id}`, { in_transit: { ...cur, [t.to_branch]: newQty } }, { Prefer: 'return=minimal' });
      } catch (e) {}
    }
    await sb('PATCH', `/rest/v1/branch_stock_transfers?id=eq.${id}`, {
      status: 'cancelled', cancelled_at: new Date().toISOString(), cancelled_by: 'الأدمن'
    }, { Prefer: 'return=minimal' });
    await sb('POST', '/rest/v1/branch_notifications', {
      branch_key: t.from_branch, type: 'transfer_cancelled', ref_id: id,
      message: `❌ تم إلغاء فاتورة النقل #${t.transfer_number} وإعادة الكمية لفرعك`
    });
    await sendTelegram(`❌ <b>تم إلغاء فاتورة نقل مخزون</b>\n#${t.transfer_number}\n📤 ${t.from_branch_name} → 📥 ${t.to_branch_name}\nبواسطة الأدمن`);
    closeModal();
    showToast('تم إلغاء الفاتورة وإعادة الكمية', 'ok');
    renderStockTransfersAdmin();
  } catch (e) {
    showToast('خطأ: ' + e.message, 'err');
  }
}
window.cancelStockTransferAdmin = cancelStockTransferAdmin;

<script>
if (typeof GMTTour !== 'undefined' && typeof buildAdminTourSteps === 'function') {

} else {

/* ═══ ADM-1 (2026-07-13) — أُغلق نهائياً ═══
   الزر كان ينادي restartTour() → _gmtTour → buildAdminTourSteps() **غير معرَّفة أصلاً**
   ⇒ «الجولة غير متاحة» دائماً. الجولة القديمة (gmt-tour) مُلغاة بقرارك (TOUR-1)،
   فالزر الآن يفتح **النظام التعليمي** (شاشات كاملة) مثل باقي الصفحات. */
window.restartTour = function () {
  try { localStorage.removeItem('tour_done_' + PAGE_ID); } catch (e) {}
  if (window.GMTGuide && typeof window.GMTGuide.open === 'function') { window.GMTGuide.open(); return; }
  if (window.GMTGuide && typeof window.GMTGuide.init === 'function') { window.GMTGuide.init(window.GMT_GUIDE_SPEC || {}, { splash: true }); return; }
  if (window._gmtTour) { window._gmtTour.start(); return; }
  alert('النظام التعليمي غير محمَّل — تأكد من رفع gmt-guide.js بجانب هذه الصفحة.');
};

  // ── فتح الشاشات الترحيبية أول مرة ──
  try {
    const _awk = 'gmt_onboarded_' + PAGE_ID;
    if (!localStorage.getItem(_awk)) {
      setTimeout(() => { const shown = showWelcomeSlides(); if (!shown) window._gmtTour?.start(); }, 1000);
    } else if (localStorage.getItem('tour_done_' + PAGE_ID) !== 'true') {
      setTimeout(() => window._gmtTour?.start(), 1000);
    }
  } catch(e) {}
</script>

<script>
/* ═══ م19: تغيير أسماء نقاط البيع — العرض فقط (display_name بجدول inv_columns) ═══ */
(function(){
  const btn = document.createElement('button');
  btn.textContent = '🏷️ أسماء نقاط البيع';
  btn.style.cssText = 'position:fixed;bottom:16px;left:16px;z-index:800;background:linear-gradient(135deg,#1a1a1a,#2a1215);color:#fff;border:none;border-radius:12px;padding:11px 15px;font-family:Cairo,Arial,sans-serif;font-size:12px;font-weight:900;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.3);';
  btn.onclick = openBranchNames;
  if (document.body) document.body.appendChild(btn);
  else document.addEventListener('DOMContentLoaded', () => document.body.appendChild(btn));

  async function openBranchNames(){
    const ov = document.createElement('div'); ov.id='bn-ov';
    ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:18px;';
    ov.innerHTML = '<div style="background:#fff;border-radius:16px;padding:20px;max-width:420px;width:100%;font-family:Cairo,Arial,sans-serif;direction:rtl;">'
      + '<div style="font-weight:900;font-size:15px;margin-bottom:4px;">🏷️ أسماء نقاط البيع</div>'
      + '<div style="font-size:11px;color:#6b7280;margin-bottom:12px;line-height:1.7;">تغيير الاسم الظاهر فقط (بالواجهات والفواتير) — مفاتيح الفروع وبياناتها لا تُمس إطلاقاً.</div>'
      + '<div id="bn-list" style="display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow:auto;">جارٍ التحميل…</div>'
      + '<div style="display:flex;gap:8px;margin-top:14px;">'
      + '<button id="bn-save" style="flex:1;background:#C00012;color:#fff;border:none;border-radius:10px;padding:11px;font-weight:900;font-family:inherit;cursor:pointer;">حفظ الأسماء</button>'
      + '<button id="bn-close" style="flex:1;background:#f3f4f6;color:#374151;border:none;border-radius:10px;padding:11px;font-weight:800;font-family:inherit;cursor:pointer;">إغلاق</button>'
      + '</div></div>';
    document.body.appendChild(ov);
    document.getElementById('bn-close').onclick = () => ov.remove();
    const H = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
    let rows = [];
    try {
      const r = await fetch(SB_URL + '/rest/v1/inv_columns?is_branch=eq.true&select=key_name,display_name&order=sort_order.asc', { headers: H });
      rows = await r.json();
      if (!Array.isArray(rows)) throw new Error(JSON.stringify(rows).slice(0,80));
    } catch (e) { document.getElementById('bn-list').textContent = 'تعذّر التحميل: ' + e.message; return; }
    document.getElementById('bn-list').innerHTML = rows.map(b =>
      '<div style="display:flex;align-items:center;gap:8px;"><code style="font-size:10px;color:#9ca3af;flex-shrink:0;direction:ltr;">'+b.key_name+'</code>'
      + '<input data-bk="'+b.key_name+'" value="'+String(b.display_name||'').replace(/"/g,'&quot;')+'" style="flex:1;border:1.5px solid #e5e7eb;border-radius:9px;padding:9px 11px;font-family:inherit;font-size:13px;"></div>'
    ).join('') || '<div style="color:#9ca3af;font-size:12px;">لا فروع بعد — تُنشأ من نظام الجرد.</div>';
    document.getElementById('bn-save').onclick = async () => {
      const inputs = Array.from(document.querySelectorAll('#bn-list [data-bk]'));
      let n = 0;
      for (const inp of inputs) {
        const orig = (rows.find(r => r.key_name === inp.dataset.bk) || {}).display_name || '';
        const v = inp.value.trim();
        if (v && v !== orig) {
          await fetch(SB_URL + '/rest/v1/inv_columns?key_name=eq.' + encodeURIComponent(inp.dataset.bk), { method:'PATCH', headers:H, body: JSON.stringify({ display_name: v }) });
          n++;
        }
      }
      alert(n ? ('✓ حُدِّث '+n+' — يظهر بكل الواجهات والفواتير') : 'لا تغييرات');
      ov.remove();
    };
  }
  window.openBranchNames = openBranchNames;
})();
</script>
